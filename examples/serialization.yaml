openapi: 3.1.0
info:
  title: Query and multipart example
  version: 1.0.0

paths:
  /wire:
    post:
      operationId: echoWirePayload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WirePayload"
      responses:
        "200":
          description: Echoed payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WirePayload"

  /search:
    get:
      operationId: search
      parameters:
        - name: csv
          in: query
          required: true
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: spaced
          in: query
          style: spaceDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: piped
          in: query
          style: pipeDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        "204":
          description: No content

  /upload:
    post:
      operationId: upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [display-name, file, tags, metadata]
              properties:
                display-name:
                  type: string
                file:
                  type: string
                  format: binary
                tags:
                  type: array
                  items:
                    type: string
                metadata:
                  type: object
                  required: [source-name]
                  properties:
                    source-name:
                      type: string
      responses:
        "204":
          description: Uploaded

components:
  schemas:
    WirePayload:
      type: object
      required: [display-name, nested-value]
      properties:
        display-name:
          type: string
        nested-value:
          type: object
          required: [inner-key]
          properties:
            inner-key:
              type: string
