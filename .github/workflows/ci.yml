name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-fmt:
    name: Rust format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  rust-tests:
    name: Rust unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  cross-platform-tests:
    name: Cross-platform runtime tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      # tokyo-cli-runtime is the crate that ships into every generated CLI and
      # holds the only OS-specific runtime code (the `#[cfg(windows)]`
      # self-update path), so it is what needs per-OS coverage. The codegen
      # crates are platform-independent Rust; their test *fixtures* are not yet
      # Windows-clean (LF/CRLF golden files, unix-only cargo/git/gh stub
      # scripts), which is separate hardening tracked apart from this job.
      - run: cargo test -p tokyo-cli-runtime --locked

  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  generated-cli-compile:
    name: Generated CLI compile gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      - run: >-
          cargo test -p tokyo-emit-cli
          --test compile_gate
          --locked
          -- --ignored

  release-packages:
    name: Release package validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.97.1
      - run: python3 scripts/verify-release.py
      - run: >-
          cargo package --locked --no-verify
          -p tokyo-ir
          -p tokyo-cli-runtime
          -p tokyo-import-openapi
          -p tokyo-codegen-engine
          -p tokyo-emit-cli
          -p tokyo-cli
