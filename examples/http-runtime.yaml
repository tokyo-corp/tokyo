openapi: 3.1.0
info:
  title: HTTP runtime behavior
  version: 1.0.0

paths:
  /mixed:
    get:
      operationId: getMixed
      responses:
        "200":
          description: JSON response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "202":
          description: Text response
          content:
            text/plain:
              schema:
                type: string
        "204":
          description: Empty response
        "422":
          description: Typed validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          description: Wildcard problem
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /download:
    get:
      operationId: download
      responses:
        "200":
          description: Raw bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /replace:
    put:
      operationId: replace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
      responses:
        "204":
          description: Replaced

  /submit:
    post:
      operationId: submit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
      responses:
        "204":
          description: Submitted

  /optional-json:
    post:
      operationId: optionalJson
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
      responses:
        "204":
          description: Submitted optionally

  /multipart-replace:
    put:
      operationId: replaceMultipart
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "204":
          description: Replaced

components:
  schemas:
    Message:
      type: object
      required: [message]
      properties:
        message:
          type: string
    Problem:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
